naftiko: 1.0.0-alpha2
info:
  label: FASHN AI API
  description: 'FASHN AI is a generative-image platform tailored for fashion. The public API exposes an asynchronous prediction
    workflow: clients submit a job against a named model with model-specific inputs, then poll a status endpoint until the
    prediction completes. Models include Try-On Max, Product to Model, Face to Model, Model Create, Model Swap, Edit, Reframe,
    Image to Video, and Background Remove.'
  tags:
  - Fashn
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: fashn
    baseUri: https://api.fashn.ai/v1
    description: FASHN AI API HTTP API.
    authentication:
      type: bearer
      token: '{{FASHN_TOKEN}}'
    resources:
    - name: run
      path: /run
      operations:
      - name: runprediction
        method: POST
        description: Submit a new prediction job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: status-id
      path: /status/{id}
      operations:
      - name: getpredictionstatus
        method: GET
        description: Retrieve prediction status and output
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Prediction identifier returned from /run.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: fashn-rest
    description: REST adapter for FASHN AI API.
    resources:
    - path: /run
      name: runprediction
      operations:
      - method: POST
        name: runprediction
        description: Submit a new prediction job
        call: fashn.runprediction
        outputParameters:
        - type: object
          mapping: $.
    - path: /status/{id}
      name: getpredictionstatus
      operations:
      - method: GET
        name: getpredictionstatus
        description: Retrieve prediction status and output
        call: fashn.getpredictionstatus
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: fashn-mcp
    transport: http
    description: MCP adapter for FASHN AI API for AI agent use.
    tools:
    - name: runprediction
      description: Submit a new prediction job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fashn.runprediction
      outputParameters:
      - type: object
        mapping: $.
    - name: getpredictionstatus
      description: Retrieve prediction status and output
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fashn.getpredictionstatus
      with:
        id: tools.id
      inputParameters:
      - name: id
        type: string
        description: Prediction identifier returned from /run.
        required: true
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    FASHN_TOKEN: FASHN_TOKEN
