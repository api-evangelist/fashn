aid: fashn
name: FASHN AI
description: >-
  FASHN AI is an AI-first company specializing in human-centric generative
  image models tailored for fashion applications. The public API offers an
  asynchronous prediction workflow against a catalog of models including
  Try-On Max, Product to Model, Face to Model, Model Create, Model Swap, Edit,
  Reframe, Image to Video, and Background Remove.
